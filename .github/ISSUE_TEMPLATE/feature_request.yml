name: Feature Request
description: Suggest a new feature or improvement for the Hermes Agent knowledge base
title: "[Feature]: "
labels: ["enhancement"]
assignees:
  - untaldouglas
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to suggest a feature!
  - type: input
    id: contact
    attributes:
      label: Contact Information
      description: How can we get in touch with you if we need more info?
      placeholder: ex. email@example.com
    validations:
      required: false
  - type: textarea
    id: feature-description
    attributes:
      label: Feature Description
      description: A clear and concise description of what you want to happen.
      placeholder: "Example: I would like a skill that the tecnico-report skill also generate a weekly summary of hours per project."
      render: normal
    validations:
      required: true
  - type: textarea
    id: motivation
    attributes:
      label: Motivation or Use Case
      description: Why is this feature needed? How would it help you or the team?
      placeholder: "It would help technicians track their time better and provide data for monthly reports."
      render: normal
    validations:
      required: true
  - type: textarea
    id: additional-context
    attributes:
      label: Additional Context
      description: Add any other context, screenshots, or mockups about the feature request here.
      render: normal
    validations:
      required: false
  - type: dropdown
    id: version
    attributes:
      label: Version
      description: What version of our knowledge base are you using?
      options:
        - main (latest)
        - v1.0.0
        - Other (please specify in description)
    validations:
      required: true
  - type: dropdown
    id: environment
    attributes:
      label: Environment
      description: What environment are you using?
      options:
        - Ubuntu/Debian
        - macOS
        - Windows (WSL2)
        - Other (please specify)
    validations:
      required: true